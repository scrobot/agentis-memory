name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew test

  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub login (optional, avoids rate limits)
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Clear stale Docker credentials
        if: vars.DOCKERHUB_USERNAME == ''
        run: docker logout 2>/dev/null || true

      - name: Build Docker image
        run: docker build -t agentis-memory:test .

      - name: Save Docker image
        run: docker save agentis-memory:test | gzip > /tmp/agentis-memory-test.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/agentis-memory-test.tar.gz
          retention-days: 1

  integration-test:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'

      - uses: gradle/actions/setup-gradle@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/agentis-memory-test.tar.gz

      - name: Integration tests
        run: ./gradlew integrationTest

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install mkdocs-material

      - name: Validate docs build
        working-directory: docs-site
        run: mkdocs build --strict
