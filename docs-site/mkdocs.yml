site_name: Agentis Memory
site_url: https://scrobot.github.io/agentis-memory
site_description: Working memory for AI agents. Redis protocol. Single binary.
repo_url: https://github.com/scrobot/agentis-memory
repo_name: scrobot/agentis-memory
edit_uri: edit/main/docs-site/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Commands:
      - Overview: commands/index.md
      - Memory: commands/memory.md
      - Strings: commands/strings.md
      - Hashes: commands/hashes.md
      - Lists: commands/lists.md
      - Sets: commands/sets.md
      - Sorted Sets: commands/sorted-sets.md
      - Server: commands/server.md
  - Configuration: configuration.md
  - Deployment: deployment.md
  - Integrations:
      - Python (redis-py): integrations/redis-py.md
      - Vercel AI SDK: integrations/vercel-ai-sdk.md
      - LangChain: integrations/langchain.md
      - Claude Code: integrations/claude-code.md
  - Benchmarks: benchmarks.md
  - Contributing: contributing.md
