services:
  agentis-memory:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentis-memory:latest
    container_name: agentis-memory
    ports:
      - "6399:6399"
    volumes:
      - agentis-data:/data
    healthcheck:
      # Send PING via raw RESP and check for +PONG in the response.
      # Uses bash's built-in /dev/tcp — no extra tooling required.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/6399 && printf '*1\\r\\n$4\\r\\nPING\\r\\n' >&3 && read -t 2 line <&3 && [[ \"$$line\" == *PONG* ]]"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - agentis-net

  # Native image variant — build with: docker compose --profile native up
  agentis-memory-native:
    build:
      context: .
      dockerfile: Dockerfile.native
    image: agentis-memory:native
    container_name: agentis-memory-native
    ports:
      - "6499:6399"
    volumes:
      - agentis-native-data:/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/6399 && printf '*1\\r\\n$4\\r\\nPING\\r\\n' >&3 && read -t 2 line <&3 && [[ \"$$line\" == *PONG* ]]"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    profiles:
      - native
    networks:
      - agentis-net

  redis-insight:
    # Pin to a specific version for reproducibility.
    # Check https://hub.docker.com/r/redis/redisinsight/tags for the latest release.
    image: redis/redisinsight:2.66
    container_name: redis-insight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    depends_on:
      agentis-memory:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentis-net

volumes:
  agentis-data:
  agentis-native-data:
  redisinsight-data:

networks:
  agentis-net:
    driver: bridge
